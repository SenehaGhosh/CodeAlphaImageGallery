<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Image Gallery</h1>

<!-- FILTER BUTTONS -->
<div class="filters">
  <button onclick="filterImages('all')">All</button>
  <button onclick="filterImages('nature')">Nature</button>
  <button onclick="filterImages('city')">City</button>
</div>

<!-- GALLERY -->
<div class="gallery">
  <img src="https://picsum.photos/id/1015/400/300" data-category="nature">
  <img src="https://picsum.photos/id/1011/400/300" data-category="nature">
  <img src="https://picsum.photos/id/1012/400/300" data-category="city">
  <img src="https://picsum.photos/id/1013/400/300" data-category="city">
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <span class="close">&times;</span>
  <img id="lightbox-img">
  <div class="controls">
    <button onclick="prevImage()">Prev</button>
    <button onclick="nextImage()">Next</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
